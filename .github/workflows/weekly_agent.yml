name: Slop Galaxy Weekly Agent

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-galaxy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
        run: python scripts/slop_agent.py

- name: Commit changes
        run: |
          echo "=== COMMIT STEP START ==="
          cat .git/config
          git config user.name "Slop Galaxy Agent"
          git config user.email "agent@sloptilyoudrop.com"
          git fetch origin main
          git reset --soft origin/main
          git add index.html agent_run_log.txt || true
          git diff --staged --quiet || git commit -m "agent: weekly node update $(date +%Y-%m-%d)"
          git push origin main --force

     
      - name: Trigger Pages rebuild
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.requestPagesBuild({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
