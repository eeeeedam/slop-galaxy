name: Slop Galaxy Weekly Agent
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
jobs:
  update-galaxy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
        run: python scripts/slop_agent.py
      - name: Commit changes
        run: |
          git config user.name "Slop Galaxy Agent"
          git config user.email "agent@sloptilyoudrop.com"
          git add index.html agent_run_log.txt || true
          git diff --staged --quiet || git commit -m "agent: weekly node update $(date +%Y-%m-%d)" && git push
